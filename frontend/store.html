<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المتجر</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <!-- المنتجات -->
    <div class="main">
        <div id="pagination"></div>
        <div class="filters">

    <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج..." oninput="applyFilters()">

    <select id="priceFilter" onchange="applyFilters()">
        <option value="all">كل الأسعار</option>
        <option value="low">أقل من 50$</option>
        <option value="mid">50$ - 150$</option>
        <option value="high">أكثر من 150$</option>
    </select>

</div>
        <h2>المنتجات</h2>
        <div id="products"></div>
    </div>

    <!-- القائمة الجانبية -->
    <div class="sidebar">

        <h3 id="usernameBox"></h3>

        <button onclick="logout()">تسجيل خروج</button>

        <button id="adminBtn" onclick="goAdmin()" style="display:none">
            لوحة التحكم
        </button>

        <hr>

        <h4>السلة</h4>
        <div id="cartItems"></div>
        <div id="paypal-container"></div>
        <button onclick="checkout()">شراء</button>
        

    </div>

</div>
<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>

        <img id="modalImage">
        <h2 id="modalName"></h2>
        <p id="modalDesc"></p>
        <h3 id="modalPrice"></h3>

        <button onclick="buyFromModal()">شراء الآن</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
